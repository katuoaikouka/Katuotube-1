<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing: {{ game_id }}</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        iframe { border: none; width: 100vw; height: 100vh; display: block; }
        .back-btn { 
            position: fixed; top: 10px; left: 10px; z-index: 1000; 
            background: rgba(0,0,0,0.5); color: white; border: 1px solid white;
            padding: 5px 15px; cursor: pointer; text-decoration: none; border-radius: 5px;
            opacity: 0.3; transition: opacity 0.3s;
        }
        .back-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <a href="/game.html" class="back-btn">← 戻る</a>
    <iframe src="{{ game_url }}"></iframe>
</body>
</html>
