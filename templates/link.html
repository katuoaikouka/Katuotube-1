<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度リンクチェッカー | かつおTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main: #ff0000;
            --main-hover: #cc0000;
            --bg: #f4f7f6;
            --success: #27ae60;
            --error: #e74c3c;
            --waiting: #bdc3c7;
            --border: #dee2e6;
            --card-bg: #ffffff;
        }

        body { 
            background-color: var(--bg); 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            color: #333; 
            line-height: 1.6;
        }

        .tool-container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        .tool-header { 
            border-bottom: 2px solid var(--main); 
            margin-bottom: 30px; 
            padding-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
        }

        .tool-header h2 { 
            margin: 0; 
            color: var(--main); 
            font-size: 1.8rem; 
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tool-header p {
            margin: 8px 0 0 0;
            font-size: 0.95rem;
            color: #7f8c8d;
        }
        
        .input-section {
            margin-bottom: 25px;
        }

        textarea { 
            width: 100%; 
            height: 150px; 
            padding: 18px; 
            border: 2px solid var(--border); 
            border-radius: 12px; 
            font-size: 15px; 
            outline: none; 
            box-sizing: border-box; 
            resize: vertical;
            transition: border-color 0.3s;
            background: #fafafa;
        }

        textarea:focus {
            border-color: var(--main);
            background: #fff;
        }
        
        .button-group { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px; 
        }

        .btn { 
            flex: 1; 
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: all 0.2s;
            font-size: 1rem;
        }

        .check-btn { 
            background: var(--main); 
            color: white; 
            box-shadow: 0 4px 0 #b30000;
        }

        .check-btn:hover {
            background: var(--main-hover);
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b30000;
        }

        .check-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .check-btn:disabled { 
            background: #dcdde1; 
            box-shadow: none;
            cursor: not-allowed; 
            transform: none;
        }

        .reset-btn { 
            background: #f1f2f6; 
            color: #57606f; 
            max-width: 140px; 
        }
        
        .reset-btn:hover {
            background: #dfe4ea;
        }

        #progress-container { 
            margin: 25px 0; 
            background: #f1f2f6; 
            height: 10px; 
            border-radius: 5px; 
            overflow: hidden; 
            display: none; 
        }

        #progress-bar { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, var(--main), #ff6b6b); 
            transition: width 0.4s ease; 
        }

        .tool-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-top: 30px; 
        }

        .tool-card { 
            border: 1px solid var(--border); 
            padding: 20px 15px; 
            border-radius: 15px; 
            background: var(--card-bg); 
            text-align: center; 
            transition: all 0.3s ease; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tool-card i { 
            font-size: 2rem; 
            margin-bottom: 12px; 
            display: block; 
        }

        .tool-card h3 { 
            margin: 0; 
            font-size: 0.85rem; 
            word-break: break-all; 
            color: #2f3542; 
            max-height: 2.4em; 
            overflow: hidden;
            line-height: 1.2;
        }

        /* 状態別スタイル */
        .is-waiting { border-color: var(--border); color: var(--waiting); }
        
        .is-loading { border-color: var(--main); background: rgba(255,0,0,0.02); }
        .is-loading i { color: var(--main); animation: spin 1s linear infinite; }
        
        .is-ok { border-bottom: 4px solid var(--success); }
        .is-ok i { color: var(--success); }
        
        .is-error { border-bottom: 4px solid var(--error); background: rgba(231, 76, 60, 0.02); }
        .is-error i { color: var(--error); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .stats { 
            font-size: 1rem; 
            font-weight: bold; 
            color: var(--main);
            background: rgba(255,0,0,0.05);
            padding: 5px 15px;
            border-radius: 20px;
        }

        @media (max-width: 600px) {
            .tool-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .button-group { flex-direction: column; }
            .reset-btn { max-width: none; }
        }
    </style>
</head>
<body>

<div class="tool-container">
    <div class="tool-header">
        <div>
            <h2><i class="fas fa-link"></i> リンクチェッカー</h2>
            <p>URLの生存をHTML取得と画像判定で高精度にチェックします</p>
        </div>
        <div id="stats" class="stats"></div>
    </div>

    <div class="input-section">
        <textarea id="urlList" placeholder="チェックしたいURLを1行ずつ入力してください（例: https://google.com）"></textarea>
    </div>
    
    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="button-group">
        <button id="startBtn" class="btn check-btn" onclick="startAdvancedCheck()">
            <i class="fas fa-play"></i> チェック開始
        </button>
        <button class="btn reset-btn" onclick="resetAll()">
            <i class="fas fa-undo"></i> リセット
        </button>
    </div>

    <div id="resultGrid" class="tool-grid"></div>
</div>

<script>
    const CONCURRENCY = 4;

    async function checkSingleUrl(url, id, retry = true) {
        const card = document.getElementById(id);
        card.className = 'tool-card is-loading';
        card.querySelector('i').className = "fas fa-sync-alt";

        try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();

            if (data && data.contents !== null) {
                return finalize(id, true);
            }
            throw new Error("HTML fail");

        } catch (e) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => { finalize(id, true); resolve(); };
                img.onerror = () => {
                    if (retry) {
                        setTimeout(() => resolve(checkSingleUrl(url, id, false)), 1000);
                    } else {
                        finalize(id, false);
                        resolve();
                    }
                };
                img.src = `${new URL(url).origin}/favicon.ico?t=${Date.now()}`;
                setTimeout(() => { img.src = ""; resolve(finalize(id, false)); }, 5000);
            });
        }
    }

    function finalize(id, isSuccess) {
        const card = document.getElementById(id);
        if (!card) return;
        if (isSuccess) {
            card.className = 'tool-card is-ok';
            card.querySelector('i').className = "fas fa-check-circle";
        } else {
            card.className = 'tool-card is-error';
            card.querySelector('i').className = "fas fa-exclamation-triangle";
        }
    }

    async function startAdvancedCheck() {
        const input = document.getElementById('urlList').value;
        const urls = input.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (urls.length === 0) return;

        const grid = document.getElementById('resultGrid');
        const startBtn = document.getElementById('startBtn');
        const stats = document.getElementById('stats');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        
        grid.innerHTML = "";
        startBtn.disabled = true;
        progressContainer.style.display = "block";

        urls.forEach((url, i) => {
            const card = document.createElement('div');
            card.className = 'tool-card is-waiting';
            card.id = `card-${i}`;
            card.innerHTML = `<i class="fas fa-hourglass-start"></i><h3>${url}</h3>`;
            grid.appendChild(card);
        });

        for (let i = 0; i < urls.length; i += CONCURRENCY) {
            const chunk = urls.slice(i, i + CONCURRENCY);
            const promises = chunk.map((url, index) => {
                let targetUrl = url.startsWith('http') ? url : 'https://' + url;
                return checkSingleUrl(targetUrl, `card-${i + index}`);
            });
            
            await Promise.all(promises);
            const progress = Math.round(((i + chunk.length) / urls.length) * 100);
            progressBar.style.width = progress + "%";
            stats.innerText = `${i + chunk.length} / ${urls.length}`;
        }

        stats.innerText = "完了";
        startBtn.disabled = false;
    }

    function resetAll() {
        document.getElementById('urlList').value = "";
        document.getElementById('resultGrid').innerHTML = "";
        document.getElementById('stats').innerText = "";
        document.getElementById('startBtn').disabled = false;
        document.getElementById('progress-bar').style.width = "0%";
        document.getElementById('progress-container').style.display = "none";
    }
</script>
</body>
</html>
